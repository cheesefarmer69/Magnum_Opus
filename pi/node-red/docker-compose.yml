# Node-RED container voor Magnum Opus (`magnum-Opus`), gecodificeerd.
#
# WAAROM: de container werd tot nu toe handmatig op de Pi aangemaakt (niets in de repo).
# Voor persistente spelstate moet `/data` (incl. `/data/context/` van de contextStorage in
# settings.js) op PERSISTENTE opslag staan i.p.v. de wegwerpbare containerlaag. Deze compose
# legt dat vast. Op deze Pi is er geen aparte SSD: de SD-kaart (`/`, root-fs) IS de persistente
# opslag — een map in de home (bv. /home/pi/nodered-data) overleeft prima een container-recreate
# en reboot. Heb je later wél een SSD, zet NODE_RED_DATA dan op het SSD-pad; verder verandert niets.
#
# EENMALIGE MIGRATIE (zie pi/node-red/DEPLOY.md): kopieer de bestaande container-`/data`
# (flows.json, flows_cred.json, settings.js, .config.*) naar NODE_RED_DATA VOOR de eerste
# `docker compose up`, anders raakt de huidige setup (flows + credential-sleutel) kwijt.
#
# Draaien vanuit deze map:
#   NODE_RED_DATA=/home/pi/nodered-data docker compose up -d
# of zet NODE_RED_DATA in een .env-bestand naast deze compose.

services:
  node-red:
    image: nodered/node-red:4.1.7        # gepind (zie docs/versions.md); was 'latest'
    container_name: magnum-Opus
    restart: unless-stopped
    # OOM-sturing op de 1 GB-Pi: zonder limieten kiest de kernel-OOM-killer zijn slachtoffer
    # op RSS-heuristiek en kan hij net zo goed de BROKER doden (bus weg = alles stil) als
    # Node-RED. Met deze limiet raakt geheugendruk voorspelbaar node-red — die heeft
    # healthcheck+autoheal+rehydrate en komt vanzelf goed. (mem_limit werkt met compose v2.)
    mem_limit: 600m
    labels:
      # Laat de autoheal-container deze container bewaken (zie service 'autoheal' onderaan).
      - "autoheal=true"
    healthcheck:
      # WAAROM: `restart: unless-stopped` herstart enkel een container die CRASHT. Een Node-RED die
      # blijft draaien maar HANGT (event-loop vast, geheugendruk op de 1 GB-Pi) blijft "Up" en wordt
      # door Docker met rust gelaten -- dan zijn dashboard en simulator onbereikbaar tot je reboot.
      # Deze check haalt de UI echt op; faalt hij 3x na elkaar, dan wordt de container 'unhealthy'
      # (meteen zichtbaar in `docker ps`) en herstart autoheal hem.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:1880/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s      # Node-RED heeft op een Pi 4 makkelijk 30-60 s nodig om te booten
    logging:
      # SD-bescherming: zonder cap groeit de json-file-log onbeperkt (volle SD = read-only fs).
      # Zelfde caps staan host-breed in /etc/docker/daemon.json (zie docs/hardware/hardware-info.md).
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "1880:1880"
    environment:
      - TZ=Europe/Brussels
    extra_hosts:
      # host.docker.internal -> het host-IP op de docker-bridge. De mqtt-broker-confignode in
      # flows.json verbindt hiernaartoe i.p.v. naar een hardcoded eth0-IP (192.168.1.43), zodat
      # Node-RED de broker OOK bereikt op het veld, waar eth0 geen thuisrouter/DHCP heeft.
      - "host.docker.internal:host-gateway"
    volumes:
      # /data op persistente opslag -> flows + credentials + /data/context (persistente
      # global-context). Pas NODE_RED_DATA aan; default is een map op de SD-kaart (root-fs).
      - ${NODE_RED_DATA:-/home/pi/nodered-data}:/data
      # settings.js uit de repo is autoritatief (bevat contextStorage). Read-only overlay:
      # Node-RED schrijft nooit naar settings.js zelf, wel naar de rest van /data.
      - ./settings.js:/data/settings.js:ro
      # Simulator read-only in de container; via httpStatic (settings.js) geserveerd op
      # http://<pi>:1880/sim/ — zo werkt de simulator op elk toestel zonder losse bestanden.
      - ../simulator:/sim-static:ro
      # CPU-temperatuur van de Pi (read-only) voor de thermiek-tegel op het Spelstatus-
      # dashboard: een Pi 4 in een dichte kist throttelt bij 80 °C — dat uit zich als
      # "alles traag" en werd voorheen nergens bewaakt. Zie docs/hardware/hardware-info.md.
      - /sys/class/thermal:/sys/class/thermal:ro

  mosquitto:
    # Was een handmatige, ongecodificeerde container ("MQTT-broker", tag latest) — hier vastgelegd:
    # gepinde tag (geen stille major-upgrade), restart-policy (bus komt terug na stroomdip/reboot),
    # config uit de repo, en /mosquitto/data persistent zodat retained messages (spel/state,
    # config/spelers, spel/type, tiers, ...) een recreate overleven. MIGRATIE vanaf de oude
    # container: zie docs/handleidingen/hub-noodherstel.md (docker cp van /mosquitto/data
    # VOORDAT je de oude container verwijdert; container_name blijft "MQTT-broker" zodat
    # bestaande runbook-commando's blijven werken).
    image: eclipse-mosquitto:2.0.21
    container_name: MQTT-broker
    restart: unless-stopped
    # De broker is het hart van de bus: begrens zijn geheugen (retained-set is klein) en
    # laat autoheal hem herstarten als hij HANGT (restart-policy vangt enkel crashes).
    mem_limit: 128m
    labels:
      - "autoheal=true"
    healthcheck:
      # Echte end-to-end check: subscribe op het broker-uptime-topic. Faalt 3x -> unhealthy
      # -> autoheal herstart de broker (retained messages staan persistent op /mosquitto/data).
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/uptime", "-C", "1", "-W", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "1883:1883"    # MQTT TCP (Node-RED, bridge, audio, testharnas)
      - "9001:9001"    # MQTT over WebSocket (simulator/dashboard in de browser)
    volumes:
      - ../../config/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${MOSQUITTO_DATA:-/home/pi/mosquitto-data}:/mosquitto/data

  autoheal:
    # WAAROM DEZE CONTAINER BESTAAT: Docker herstart een 'unhealthy' container NIET vanzelf --
    # een healthcheck alleen doet dus niets, hij zet enkel een vlaggetje. Autoheal kijkt elke 30 s
    # naar containers met het label autoheal=true en herstart wat 'unhealthy' staat. Dat vangt een
    # Node-RED die 's nachts vastloopt op, zodat je 's ochtends niet meer hoeft te rebooten.
    # De spelstand overleeft zo'n herstart (contextStorage + retained spel/state).
    #
    # LET OP: haal dit image ÉÉN KEER binnen terwijl je nog internet hebt (thuis):
    #     cd pi/node-red && docker compose pull
    # Op het veld is er geen internet meer om het alsnog te downloaden.
    image: willfarrell/autoheal:1.2.0
    container_name: autoheal
    restart: unless-stopped
    network_mode: none          # heeft geen netwerk nodig, praat enkel met de docker-socket
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
