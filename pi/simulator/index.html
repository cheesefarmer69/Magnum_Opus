<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Magnum Opus — Simulator</title>
    <link rel="stylesheet" href="sim.css">
    <script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
</head>
<body>
    <header>
        <div class="hdr-group">
            <label>Broker: <input id="broker-host" type="text" value="192.168.1.43"></label>
            <label>:<input id="broker-port" type="number" value="9001" style="width:5em"></label>
            <button id="btn-connect">Connect</button>
            <span id="conn-status" class="conn-off">offline</span>
        </div>
        <div class="hdr-group">
            <span>Modus:</span>
            <label><input type="radio" name="modus" value="monitor" checked> Monitor</label>
            <label><input type="radio" name="modus" value="sim"> Simulatie</label>
        </div>
        <div class="hdr-group">
            <button id="btn-pause">Pause</button>
            <span class="tick-label">Tick: 250 ms</span>
        </div>
    </header>

    <main>
        <section id="veld-wrapper">
            <svg id="veld" viewBox="-300 -300 600 600" xmlns="http://www.w3.org/2000/svg">
                <g id="ringen"></g>
                <g id="spaken"></g>
                <g id="portalen"></g>
                <g id="paaltjes"></g>
                <g id="led-bolletjes"></g>
                <g id="buzzers"></g>
                <g id="spelers"></g>
                <g id="paal-labels"></g>
            </svg>
        </section>

        <div id="event-balk">
            <div class="event-kop">
                <div id="pof-teller" class="pof-teller" title="Events deze ronde">0</div>
                <h3>Huidig event</h3>
            </div>
            <div id="pof-paneel" class="pof-paneel">
                <div id="pof-timer" class="pof-timer">—</div>
                <div id="pof-event-naam" class="pof-meta"></div>
            </div>
            <h3>Doelwit</h3>
            <div id="pof-doelwit" class="pof-doelwit">—</div>
        </div>

        <aside id="zijbalk">
            <h3>Spelers</h3>
            <ul id="speler-lijst"></ul>
            <div class="aside-actions">
                <button id="btn-add-speler">+ Speler</button>
                <button id="btn-reset-spelers">Reset posities</button>
            </div>
            <h3>Toestanden</h3>
            <div id="toestanden-lijst" class="toestanden-lijst">
                <div class="toestand-leeg">Geen actieve toestanden.</div>
            </div>
        </aside>

        <aside id="histo-paneel">
            <button id="histo-toggle" title="Historiek tonen/verbergen">Historiek</button>
            <div id="histo-inhoud">
                <h3>Historiek (huidig spel)</h3>
                <div id="histo-lijst"><div class="histo-leeg">Nog geen events in dit spel.</div></div>
            </div>
        </aside>
    </main>

    <section id="log-paneel">
        <div id="log-resize-handle"></div>
        <div class="log-header">
            <h3>Log</h3>
            <details class="log-filter" id="log-filter">
                <summary>Toon ▾</summary>
                <div class="log-filter-menu">
                    <label><input type="checkbox" class="logfilt" value="info" checked> Info</label>
                    <label><input type="checkbox" class="logfilt" value="cmd" checked> Commando's</label>
                    <label><input type="checkbox" class="logfilt" value="audio" checked> Audio</label>
                    <label><input type="checkbox" class="logfilt" value="foutcode" checked> Foutcodes</label>
                </div>
            </details>
            <label class="auto-scroll-lbl"><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
            <button id="btn-clear-log">Wis</button>
        </div>
        <div id="log"></div>
    </section>

    <script src="sim.js"></script>
</body>
</html>
