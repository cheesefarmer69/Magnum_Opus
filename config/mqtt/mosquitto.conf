listener 1883
allow_anonymous true

listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
# Retained-DB elke 30 s naar disk i.p.v. de default 30 min: bij een harde stroomdip is de
# bewaarde spelstand (spel/state, config/spelers, ...) dan hooguit 30 s oud.
autosave_interval 30
# Alleen schrijven als er iets WIJZIGDE (i.c.m. autosave_interval): scheelt continue
# SD-writes van de volledige retained-set elke 30 s op een idle broker.
autosave_on_changes true
log_dest stdout

# Bescherming tegen trage/verlaten WebSocket-clients (dashboard-tab op slechte wifi):
# zonder deze caps bufferde de broker per client tot 1000 berichten ongelimiteerd in bytes.
# De 1 s-pof/status + spel/state-stroom vult dat snel; met 30+ tabs is dat tientallen MB
# op de 1 GB-Pi. Een client die zijn queue overschrijdt, verliest oude berichten (QoS 0-
# gedrag) — precies goed voor live-dashboards, die willen de NIEUWSTE stand.
max_queued_messages 200
max_queued_bytes 5242880
# Verlaten persistent sessions (clean_session=false met wisselende client-ids) niet
# eeuwig bewaren.
persistent_client_expiration 1h