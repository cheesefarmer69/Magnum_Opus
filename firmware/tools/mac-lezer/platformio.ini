; PlatformIO Project Configuration File
;
; MAC-lezer: los hulpsketchje voor de ESP32-C3 SuperMini.
; Toont het WiFi-STA-MAC (hetzelfde dat de slave bij boot opzoekt in paal_macs.h)
; in de seriële monitor, plus een kant-en-klare regel om in
; firmware/shared/paal_macs.h te plakken.
;
; Gebruik:
;   1. Selecteer deze env, Upload naar het bordje.
;   2. Open de Serial Monitor (115200).
;   3. Kopieer de {{0x..},<paal>}-regel naar paal_macs.h (vervang <paal> door het juiste nummer).

[env:esp32-c3-devkitm-1]
platform = espressif32 @ 6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Laat de monitor DTR/RTS NIET toggelen: op de C3 SuperMini houdt dat de chip
; anders soms in reset/boot -> lege monitor.
monitor_dtr = 0
monitor_rts = 0
build_flags =
    ; Native USB-CDC aan zodat de Serial Monitor werkt op de C3 SuperMini.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
