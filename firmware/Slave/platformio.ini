; PlatformIO Project Configuration File
;
; Slave: ESP32-C3 SuperMini, scant BLE-beacons, communiceert ESP-NOW met master.
; LET OP: NimBLE-Arduino blijft op 1.4.2 — 2.x heeft breaking changes.
; Zie /docs/protocol.md voor data-formaten en /CLAUDE.md voor projectcontext.

[env:esp32-c3-devkitm-1]
platform = espressif32 @ 6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; WS2812B: gebruik de IDF-RMT-driver i.p.v. FastLED's eigen refill-ISR. Die ISR werd
    ; verhongerd door WiFi/BLE (ESP-NOW + BLE-scan) -> RMT-underrun na ~3 LEDs (FIFO-diepte),
    ; waardoor maar ~3 van de 7 LEDs oplichtten. De IDF-driver hervult robuust.
    -DFASTLED_RMT_BUILTIN_DRIVER=1
    ; Gedeelde headers (firmware/shared) — o.a. paal_macs.h (MAC->PAAL_ID, één bron voor slave+master)
    -I ../shared
lib_deps =
    h2zero/NimBLE-Arduino @ 1.4.2
    fastled/FastLED @ 3.10.3

; Diagnose-build voor de LED-glitch-triage (test 2 uit het LED-plan): identieke firmware
; maar de BLE-scan staat UIT — radio stil tijdens het "scanvenster". Kleuren foutloos met
; deze build maar glitchend met de normale? Dan is BLE-activiteit de oorzaak (timing), niet
; de hardware. NIET voor het veld flashen (detecteert geen bakens; banner waarschuwt bij boot).
[env:led-test-scan-uit]
extends = env:esp32-c3-devkitm-1
build_flags =
    ${env:esp32-c3-devkitm-1.build_flags}
    -DLED_TEST_SCAN_UIT=1

