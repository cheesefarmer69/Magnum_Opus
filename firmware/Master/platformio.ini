; PlatformIO Project Configuration File
;
; Master: ESP32 WROOM-32, ontvangt ESP-NOW van slaves en praat seriëel met Pi.
; Zie /docs/protocol.md voor data-formaten en /CLAUDE.md voor projectcontext.
;
; Eén codebase, drie environments — één per master. Kies het juiste paalbereik +
; MASTER_NR via build_flags; de slave-MACs staan gedeeld in firmware/shared/paal_macs.h
; (één bron van waarheid voor slave én master; de master vult er zijn bereik uit).
; Selecteer onderin de VS Code-statusbalk de env (master1/master2/master3) vóór
; Build/Upload. `pio run` (zonder -e) bouwt alle drie.

[env]
platform = espressif32 @ 6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; -I ../shared geeft toegang tot firmware/shared/paal_macs.h (gedeelde MAC->PAAL_ID-tabel).
[env:master1]
build_flags = -DPAAL_MIN=1  -DPAAL_MAX=8  -DMASTER_NR=1 -I ../shared

[env:master2]
build_flags = -DPAAL_MIN=9  -DPAAL_MAX=16 -DMASTER_NR=2 -I ../shared

[env:master3]
build_flags = -DPAAL_MIN=17 -DPAAL_MAX=24 -DMASTER_NR=3 -I ../shared
